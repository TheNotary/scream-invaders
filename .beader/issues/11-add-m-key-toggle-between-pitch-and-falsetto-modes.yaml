Add keyboard binding to switch between pitch-mode and falsetto-mode during gameplay.

## Requirements
1. Listen for 'KeyM' in the existing `keydown` handler:
   - Toggle `firingMode` between 'pitch' and 'falsetto'
   - Update `#modeToggle` text to reflect current mode: "[M] Pitch Mode" / "[M] Falsetto Mode"
   - Call `updateInputModeLabel()` to refresh the input mode display

2. Initialize `#modeToggle` text on game start to show default mode ("[M] Pitch Mode")

3. Do not allow mode toggle during title/gameover screens (only when `gameState === 'playing'`)

## Dependencies
- Depends on #9 (modeToggle DOM element exists)

## Files
- game.js: keydown handler (~line 700), new toggle logic

## Acceptance
- Pressing M during gameplay toggles mode
- HUD immediately reflects the new mode
- Pressing M on title/gameover does nothing
- Mode persists across waves (doesn't reset on wave clear)

