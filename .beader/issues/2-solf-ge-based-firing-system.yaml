## Summary
Replace the volume-threshold firing system with solfège-based firing. The player fires by singing Do, Re, Mi, Fa, Sol, La, Ti. Two configurable modes: Pitch-mode (real-time pitch detection matches sung frequency to solfège notes) and Falsetto-mode (speech recognition of solfège syllables). A serene C drone plays as a reference note. On successful fire, the sung solfège word and detected pitch are displayed on screen.

## User Message
We need to make it so this game only allows the player to use do ra me fa so la ti as the utterances that allow the ship to fire. When the utterance is successful, the word sang is printed to the screen. Also the pitch of the user is printed below the word sang. We need a way of generating a root note for the users that they can match to. Make the note a C.

## Plan
Replace the volume-threshold firing system with solfège-based firing in two configurable modes: Pitch-mode (pitch detection → note matching) and Falsetto-mode (speech recognition of solfège syllables). Add a serene C drone as a reference note. Display the sung solfège word and detected pitch on screen when firing succeeds.

### Phase 1: Pitch Detection Engine
- Increase analyser.fftSize from 512 to 2048+ for vocal frequency resolution
- Implement autocorrelation-based detectPitch() using getFloatTimeDomainData()
- Add frequency-to-solfège mapping (±50 cents tolerance, octave-independent)

### Phase 2: Solfège Firing Logic
- Pitch-mode: detect pitch each frame, edge-trigger fire on solfège note match, show target note
- Falsetto-mode: extend speech recognition to recognize solfège syllables
- Modify fireWeapon() to always fire single shot in solfège mode

### Phase 3: Reference C Drone
- Layer sine oscillators (C3 + C4 + G3) at low gain, yoga-like serene timbre
- Start on gameplay, stop on game over

### Phase 4: HUD & Display
- Add DOM elements for solfège word display, pitch display, target note, mode toggle
- Manage display lifecycle (fade in/out) in update loop
- M key toggles between pitch/falsetto modes

### Phase 5: Integration & Polish
- Update overlay text for solfège instructions
- Update input mode label
- Keep volume meter for visual feedback

### Decisions
- Same weapon for all notes (single shot)
- C drone with harmonics (serene/yoga, not raw sine)
- Two modes via M key
- ±50 cents pitch tolerance
- Pure JS autocorrelation (no external library)
- Any octave accepted (C2-C6)

