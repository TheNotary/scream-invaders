Simplify the fireWeapon() function when called from solfège detection to always fire a single shot.

## Requirements
1. When firing is triggered by solfège detection (pitch or falsetto mode), always fire a single bullet:
   - No volume-based weapon tiers (no triple shot, no beam)
   - Single bullet from ship center position
   - Play `sfxShot()` sound effect

2. Keep the existing volume-based weapon selection as fallback for mouse/click mode (when `micActive` is false and user clicks).

3. Approach: Add a parameter to `fireWeapon()` or create a separate `fireSolfegeShot()` that always does single bullet, OR pass a flag that bypasses volume tier logic.

## Files
- game.js: `fireWeapon()` at line 379

## Acceptance
- Solfège-triggered fire always produces exactly one bullet
- Mouse click fallback still uses the old volume-based weapon tiers
- No visual/audio regression for the single shot

