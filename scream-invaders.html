<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scream Invaders 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; font-family: 'Press Start 2P', monospace; color: #c9d1d9; }
#gameCanvas { display: block; width: 100vw; height: 100vh; }
#webcamFeed { position: fixed; bottom: 12px; right: 12px; width: 160px; height: 120px; border: 2px solid #30363d; border-radius: 8px; z-index: 20; object-fit: cover; transform: scaleX(-1); background: #161b22; }
#hud { position: fixed; top: 0; left: 0; width: 100%; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 15; pointer-events: none; }
#hud .stat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
#hud .score-val { color: #58a6ff; font-size: 16px; }
#hud .lives-container { display: flex; gap: 6px; align-items: center; }
.life-icon { width: 18px; height: 18px; background: #39d353; border-radius: 3px; opacity: 0.9; }
.life-icon.lost { opacity: 0.15; }
#volumeMeter { position: fixed; left: 14px; top: 50%; transform: translateY(-50%); width: 10px; height: 200px; background: #21262d; border-radius: 5px; z-index: 15; overflow: hidden; border: 1px solid #30363d; }
#volumeFill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #39d353, #f0e040, #f85149); border-radius: 0 0 5px 5px; transition: height 0.05s; }
#volumeLabel { position: fixed; left: 8px; top: calc(50% + 110px); font-size: 9px; color: #484f58; z-index: 15; text-transform: uppercase; letter-spacing: 1px; }
#overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; background: rgba(13,17,23,0.92); }
#overlay.hidden { display: none; }
#overlay h1 { font-size: 28px; font-weight: 800; color: #58a6ff; margin-bottom: 4px; text-align: center; }
#overlay h1 span { color: #39d353; }
#overlay .subtitle { font-size: 10px; color: #8b949e; margin-bottom: 32px; text-align: center; }
#overlay .prompt { font-size: 12px; color: #c9d1d9; animation: pulse 1.8s ease-in-out infinite; }
#overlay .game-over-score { font-size: 28px; color: #39d353; margin-bottom: 8px; font-weight: 700; }
#overlay .game-over-wave { font-size: 16px; color: #8b949e; margin-bottom: 28px; }
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
#status { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #484f58; z-index: 15; }
#inputMode { position: fixed; bottom: 12px; left: 180px; font-size: 11px; color: #484f58; z-index: 15; }
#crtOverlay {
  position: fixed; inset: 0; z-index: 10; pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
  );
  box-shadow: inset 0 0 150px rgba(0,0,0,0.7);
}
#solfegeDisplay { position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%); font-size: 42px; color: #39d353; text-shadow: 0 0 20px rgba(57,211,83,0.6), 0 0 40px rgba(57,211,83,0.3); z-index: 15; pointer-events: none; opacity: 0; transition: opacity 0.15s ease-in; }
#pitchDisplay { position: fixed; top: calc(38% + 40px); left: 50%; transform: translateX(-50%); font-size: 14px; color: #8b949e; z-index: 15; pointer-events: none; opacity: 0; transition: opacity 0.15s ease-in; }
#targetNote { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #58a6ff; z-index: 15; pointer-events: none; opacity: 0; }
#modeToggle { position: fixed; bottom: 12px; left: 14px; font-size: 11px; color: #484f58; z-index: 15; pointer-events: none; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="crtOverlay"></div>
<video id="webcamFeed" autoplay playsinline muted></video>

<div id="hud">
  <div>
    <div class="stat">Score</div>
    <div class="score-val" id="scoreDisplay">0</div>
  </div>
  <div>
    <div class="stat" style="text-align:center;">Wave</div>
    <div class="score-val" id="waveDisplay" style="text-align:center;">1</div>
  </div>
  <div>
    <div class="stat" style="text-align:right;">Lives</div>
    <div class="lives-container" id="livesDisplay"></div>
  </div>
</div>

<div id="volumeMeter"><div id="volumeFill" style="height:0%"></div></div>
<div id="volumeLabel">VOL</div>

<div id="overlay">
  <h1><span>Scream</span> Invaders 3D</h1>
  <div class="subtitle">Sing Do Re Mi Fa Sol La Ti to shoot. Move your head, arrow keys, or say LEFT / RIGHT. Press M to toggle mode.<br><span style="font-size:9px;color:#6e7681;margin-top:8px;display:inline-block">🎧 Headphones recommended</span></div>
  <div class="prompt" id="overlayPrompt">Tap or press SPACE to start</div>
</div>

<div id="status">Loading...</div>
<div id="inputMode"></div>
<div id="solfegeDisplay"></div>
<div id="pitchDisplay"></div>
<div id="targetNote"></div>
<div id="modeToggle">[M] Pitch Mode</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
<script src="game.js"></script>
</body>
</html>
